<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080a0f">
    <link rel="icon" href="icon-192.png" sizes="192x192">
    <link rel="icon" href="icon-512.png" sizes="512x512">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inforwnet Anotação - Daniel Santos Dev</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --primary: #00d4ff;        
            --primary-glow: rgba(0, 212, 255, 0.4);
            --secondary: #ff004c;      
            --secondary-glow: rgba(255, 0, 76, 0.4);
            --success: #00ff9d;
            --bg-body: #080a0f;
            --bg-card: rgba(20, 24, 33, 0.85);
            --bg-header: rgba(13, 16, 23, 0.7);
            --bg-input: rgba(0, 0, 0, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --text-muted: #64748b;
            --border-alpha: rgba(255, 255, 255, 0.08);
            --gradient-neural: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            --radius: 14px;
            --radius-xl: 22px;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-header: rgba(255, 255, 255, 0.8);
            --bg-input: #f8f9fa;
            --text-primary: #1a1d21;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border-alpha: rgba(0, 0, 0, 0.1);
            --primary: #0088cc;
            --secondary: #d6003f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            transition: background-color 0.4s, color 0.4s;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(255, 0, 76, 0.08) 0%, transparent 40%);
        }

        .login-screen {
            position: fixed; inset: 0; background: var(--bg-body);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-screen.hidden { opacity: 0; visibility: hidden; transition: 0.5s; }
        .login-card {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border-alpha); border-radius: var(--radius-xl);
            padding: 3rem; width: 100%; max-width: 400px; text-align: center;
        }

        .header {
            background: var(--bg-header); backdrop-filter: blur(15px);
            border: 1px solid var(--border-alpha); border-radius: var(--radius-xl);
            padding: 1rem 2rem; margin: 1.5rem 0; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-text { background: var(--gradient-neural); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 1.5rem; }

        .theme-toggle, .view-toggle {
            background: var(--bg-input); border: 1px solid var(--border-alpha);
            color: var(--text-primary); padding: 10px; border-radius: 12px;
            cursor: pointer; transition: 0.3s; height: 40px;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.8rem;
        }
        .theme-toggle:hover, .view-toggle:hover { background: var(--primary); color: white; }

        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; max-width: 1400px; margin: 0 auto; padding: 0 1rem; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

        .neural-card { background: var(--bg-card); border-radius: var(--radius-xl); border: 1px solid var(--border-alpha); overflow: hidden; transition: 0.3s; }
        .card-header { padding: 1.5rem; border-bottom: 1px solid var(--border-alpha); display: flex; justify-content: space-between; align-items: center; }
        
        .neural-input {
            width: 100%; padding: 1rem; background: var(--bg-input); border: 1px solid var(--border-alpha);
            border-radius: var(--radius); color: var(--text-primary); margin-bottom: 1rem; transition: 0.3s;
        }

        #notesContainer.grid-mode {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .note-item {
            background: var(--bg-input); border-radius: var(--radius);
            padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid var(--primary); transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .note-item.private { border-left-color: var(--secondary); }
        .note-item.completed { opacity: 0.6; border-left-color: var(--success); }
        
        .note-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .badge-public { background: rgba(0, 136, 204, 0.15); color: var(--primary); }
        .badge-private { background: rgba(214, 0, 63, 0.15); color: var(--secondary); }

        .btn-primary { background: var(--gradient-neural); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-alpha); padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; }
        
        .action-icon { background: none; border: none; font-size: 1.1rem; cursor: pointer; transition: 0.2s; padding: 5px; color: var(--text-muted); }
        .icon-complete.is-done { color: var(--success); }

        .neural-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: var(--bg-input); padding: 5px; border-radius: 12px; margin-bottom: 1rem; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 8px; cursor: pointer; border-radius: 8px; font-size: 0.8rem; }
        .tab-btn.active { background: var(--gradient-neural); color: white; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); padding: 1rem; border-radius: var(--radius); text-align: center; border-top: 3px solid var(--primary); }

        .footer-credits {
            text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border-alpha);
            font-size: 0.85rem; color: var(--text-muted);
        }
        .footer-credits a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-credits a:hover { text-decoration: underline; }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <i class="fas fa-brain" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h1 class="logo-text" style="font-size: 2rem; margin-bottom: 0.5rem;">INFORWNET</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2rem;">Desenvolvido por Daniel Santos</p>
            <input type="email" class="neural-input" id="loginEmail" placeholder="Email">
            <input type="password" class="neural-input" id="loginPassword" placeholder="Senha">
            <button class="btn-primary" id="btnLoginMain" style="width: 100%;">ENTRAR</button>
            <div style="margin-top: 1.5rem; font-size: 0.8rem;">
                <a href="https://www.instagram.com/daniel.dev_2" target="_blank" style="color: var(--secondary); text-decoration: none;">
                    <i class="fab fa-instagram"></i> @daniel.dev_2
                </a>
            </div>
        </div>
    </div>

    <div class="main-content hidden" id="mainContent">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 1rem;">
            <header class="header">
                <span class="logo-text">Inforwnet Anotação</span>
                <div style="display: flex; gap: 10px;">
                    <button class="view-toggle" id="viewToggle"><i class="fas fa-th-large"></i> STICKY</button>
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-secondary" id="btnLogout"><i class="fas fa-power-off"></i></button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card"><div>TOTAL</div><div id="totalNotes">0</div></div>
                <div class="stat-card" style="border-top-color: var(--primary);"><div>PÚBLICAS</div><div id="publicNotes" style="color: var(--primary);">0</div></div>
                <div class="stat-card" style="border-top-color: var(--secondary);"><div>PRIVADAS</div><div id="privateNotes" style="color: var(--secondary);">0</div></div>
                <div class="stat-card" style="border-top-color: var(--success);"><div>FEITAS</div><div id="completedNotes" style="color: var(--success);">0</div></div>
            </div>

            <main class="main-grid">
                <section class="neural-card">
                    <div class="card-header">
                        <h2>ANOTAÇÕES</h2>
                        <button class="btn-primary" id="btnNew">+ NOVA</button>
                    </div>
                    <div style="padding: 1.5rem;">
                        <div class="neural-tabs">
                            <button class="tab-btn active" data-filter="all">Públicas</button>
                            <button class="tab-btn" data-filter="mine">Privadas</button>
                            <button class="tab-btn" data-filter="both">Todas</button>
                            <button class="tab-btn" data-filter="completed">Feitas</button>
                        </div>
                        <input type="text" class="neural-input" id="searchInput" placeholder="Buscar...">
                        <div id="notesContainer"></div>
                    </div>
                </section>

                <aside>
                    <div class="neural-card">
                        <div class="card-header"><h3>EDITOR</h3></div>
                        <div style="padding: 1.5rem;">
                            <input type="text" id="noteTitle" class="neural-input" placeholder="Título">
                            <textarea id="noteContent" class="neural-input" placeholder="Conteúdo" style="min-height: 150px;"></textarea>
                            <select id="notePublic" class="neural-input">
                                <option value="true">🌐 Público</option>
                                <option value="false">🔒 Privado</option>
                            </select>
                            <select id="noteCompleted" class="neural-input">
                                <option value="false">Em Aberto</option>
                                <option value="true">Finalizada ✅</option>
                            </select>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <button class="btn-primary" id="btnSave">SALVAR</button>
                                <button class="btn-secondary" id="btnCancel">LIMPAR</button>
                            </div>
                        </div>
                    </div>
                </aside>
            </main>

            <footer class="footer-credits">
                Projeto Inforwnet Anotação v4.0 - Criado por 
                <a href="https://www.instagram.com/daniel.dev_2" target="_blank">Daniel Santos</a> 
                <i class="fab fa-instagram"></i> @daniel.dev_2
            </footer>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsd9ywXXxibVZseCTZ_P0uejq9Ttk5VUI",
            authDomain: "notas-empresa.firebaseapp.com",
            projectId: "notas-empresa",
            storageBucket: "notas-empresa.firebasestorage.app",
            messagingSenderId: "1036347296997",
            appId: "1:1036347296997:web:6be1cc59ab70ced9a2580c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null, allNotes = [], activeFilter = 'all', editId = null;

        const themeToggle = document.getElementById('themeToggle');
        const viewToggle = document.getElementById('viewToggle');
        const notesContainer = document.getElementById('notesContainer');

        themeToggle.onclick = () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            themeToggle.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        };

        viewToggle.onclick = () => {
            const isGrid = notesContainer.classList.toggle('grid-mode');
            viewToggle.innerHTML = isGrid ? '<i class="fas fa-list"></i> LISTA' : '<i class="fas fa-th-large"></i> STICKY';
        };

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                loadNotes();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
        });

        document.getElementById('btnLoginMain').onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        };
        document.getElementById('btnLogout').onclick = () => auth.signOut();

        function loadNotes() {
            db.collection('notes').orderBy('createdAt', 'desc').onSnapshot(snap => {
                allNotes = [];
                snap.forEach(doc => allNotes.push({id: doc.id, ...doc.data()}));
                renderNotes();
                updateStats();
            });
        }

        function renderNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            notesContainer.innerHTML = '';
            const filtered = allNotes.filter(n => {
                const searchMatch = (n.title + n.content).toLowerCase().includes(query);
                if (activeFilter === 'all') return n.public && !n.completed && searchMatch;
                if (activeFilter === 'mine') return !n.public && n.ownerUID === currentUser.uid && !n.completed && searchMatch;
                if (activeFilter === 'completed') return n.completed && searchMatch;
                return !n.completed && searchMatch;
            });

            filtered.forEach(n => {
                const div = document.createElement('div');
                div.className = `note-item ${!n.public ? 'private' : ''} ${n.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${n.title}</strong>
                        <button onclick="quickToggle('${n.id}')" class="action-icon icon-complete ${n.completed ? 'is-done' : ''}">
                            <i class="fas ${n.completed ? 'fa-check-circle' : 'fa-bolt'}"></i>
                        </button>
                    </div>
                    <p style="margin:10px 0; font-size:0.9rem;">${n.content}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-top:1px solid var(--border-alpha); padding-top:8px">
                        <span class="note-badge ${n.public ? 'badge-public' : 'badge-private'}">${n.public ? 'PÚBLICA' : 'PRIVADA'}</span>
                        <div>
                            <button onclick="editNote('${n.id}')" class="action-icon" style="color:var(--primary)"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteNote('${n.id}')" class="action-icon" style="color:var(--secondary)"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                notesContainer.appendChild(div);
            });
        }

        window.quickToggle = async (id) => {
            const n = allNotes.find(x => x.id === id);
            await db.collection('notes').doc(id).update({ completed: !n.completed });
        };

        document.getElementById('btnSave').onclick = async () => {
            const data = {
                title: document.getElementById('noteTitle').value,
                content: document.getElementById('noteContent').value,
                public: document.getElementById('notePublic').value === 'true',
                completed: document.getElementById('noteCompleted').value === 'true',
                ownerUID: currentUser.uid, ownerEmail: currentUser.email,
                createdAt: editId ? allNotes.find(x => x.id === editId).createdAt : Date.now()
            };
            if(editId) { await db.collection('notes').doc(editId).update(data); editId = null; }
            else { await db.collection('notes').add(data); }
            clearEditor();
        };

        window.editNote = (id) => {
            const n = allNotes.find(x => x.id === id);
            document.getElementById('noteTitle').value = n.title;
            document.getElementById('noteContent').value = n.content;
            document.getElementById('notePublic').value = n.public.toString();
            document.getElementById('noteCompleted').value = n.completed.toString();
            editId = id; window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.deleteNote = (id) => { if(confirm("Deletar?")) db.collection('notes').doc(id).delete(); };

        function clearEditor() { 
            document.getElementById('noteTitle').value = ''; 
            document.getElementById('noteContent').value = ''; 
            document.getElementById('notePublic').value = 'true';
            document.getElementById('noteCompleted').value = 'false';
            editId = null; 
        }

        document.getElementById('btnCancel').onclick = clearEditor;

        document.getElementById('btnNew').onclick = () => { 
            clearEditor(); 
            document.getElementById('noteTitle').focus(); 
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        function updateStats() {
            document.getElementById('totalNotes').textContent = allNotes.length;
            document.getElementById('publicNotes').textContent = allNotes.filter(n => n.public && !n.completed).length;
            document.getElementById('privateNotes').textContent = allNotes.filter(n => !n.public && !n.completed).length;
            document.getElementById('completedNotes').textContent = allNotes.filter(n => n.completed).length;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); activeFilter = btn.dataset.filter; renderNotes();
            };
        });
        document.getElementById('searchInput').oninput = renderNotes;
    </script>
</body>
</html>
